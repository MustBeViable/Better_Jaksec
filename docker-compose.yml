version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: attendance_test
      MARIADB_USER: appuser
      MARIADB_PASSWORD: apppass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    image: leevivl/better-jaksec-api:latest
    container_name: spring-api
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/attendance_test
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8081:8080"
    entrypoint:
      - /app/wait-for-db.sh
      - db
      - --timeout
      - "30"
      - java
      - -jar
      - /app/app.jar
    networks:
      - betterjaksec-net
  site:
    image: leevivl/better-jaksec-site:latest
    container_name: react-site
    ports:
      - "3001:80"
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      - api
    networks:
      - betterjaksec-net
volumes:
  db_data:

networks:
  betterjaksec-net:
    driver: bridge